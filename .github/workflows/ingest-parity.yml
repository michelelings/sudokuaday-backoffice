# Read-only: clones sudokuaday.com, runs parity ingest, commits updated snapshot for the SPA.
# Does not push to or modify the website repo.
#
# The site repo (jipvandervelde/sudokuaday.com) is private. actions/checkout must use a PAT:
#   Repo → Settings → Secrets and variables → Actions → New repository secret
#   Name: SUDOKUADAY_COM_REPO_PAT
#   Value: fine-grained PAT with Contents: Read on jipvandervelde/sudokuaday.com (or classic PAT with repo scope).

name: Ingest parity snapshot

on:
  workflow_dispatch: {}
  schedule:
    # Four runs per day, spaced for Amsterdam (CET/CEST). GitHub cron is UTC-only; local time shifts by 1h at DST.
    # Hours must match web/src/lib/parityIngestSchedule.ts (PARITY_INGEST_HOURS_UTC).
    # Immediate refresh: Actions → this workflow → “Run workflow”.
    - cron: '0 7,11,15,19 * * *'

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Use Node 24 for @actions/* until it is the default (avoids deprecated Node 20 runtime warning).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - name: Require PAT for private sudokuaday.com checkout
        if: ${{ secrets.SUDOKUADAY_COM_REPO_PAT == '' }}
        run: |
          echo '::error::Add Actions secret SUDOKUADAY_COM_REPO_PAT (read-only PAT for jipvandervelde/sudokuaday.com). See workflow header comment.'
          exit 1

      # persist-credentials: false so this checkout does not replace credentials used to push to this repo.
      - uses: actions/checkout@v6
        with:
          repository: jipvandervelde/sudokuaday.com
          token: ${{ secrets.SUDOKUADAY_COM_REPO_PAT }}
          path: _sudokuaday-site
          fetch-depth: 400
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci --prefix web

      - name: Run ingest
        run: |
          export SUDOKUADAY_REPO_PATH="${GITHUB_WORKSPACE}/_sudokuaday-site"
          export SUDOKUADAY_REPO_SHA="$(git -C "${GITHUB_WORKSPACE}/_sudokuaday-site" rev-parse HEAD)"
          npm run ingest --prefix web

      - name: Commit snapshot if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/parity-snapshot.json
          if git diff --staged --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "chore: refresh parity snapshot from sudokuaday.com main"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${{ github.ref_name }}"
          fi
